version: 2
updates:
  # ルート package.json (husky)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      root-npm-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # src/package.json (Laravel フロントエンド)
  # 各グループに update-types: minor/patch を入れることで
  # major bump は個別 PR として届き、人手レビューを強制する
  - package-ecosystem: "npm"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "npm"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      storybook:
        patterns:
          - "@storybook/*"
          - "storybook"
          - "@chromatic-com/storybook"
          - "msw-storybook-addon"
        update-types:
          - "minor"
          - "patch"
      eslint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "@eslint/*"
          - "typescript-eslint"
          - "globals"
        update-types:
          - "minor"
          - "patch"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-slick"
          - "slick-carousel"
          - "@headlessui/react"
        update-types:
          - "minor"
          - "patch"
      types:
        patterns:
          - "@types/*"
        update-types:
          - "minor"
          - "patch"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "autoprefixer"
          - "postcss"
          - "eslint-plugin-tailwindcss"
        update-types:
          - "minor"
          - "patch"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "laravel-vite-plugin"
        update-types:
          - "minor"
          - "patch"
      inertia:
        patterns:
          - "@inertiajs/*"
          - "ziggy-js"
        update-types:
          - "minor"
          - "patch"
      msw:
        patterns:
          - "msw"
        update-types:
          - "minor"
          - "patch"
      typescript:
        patterns:
          - "typescript"
        update-types:
          - "minor"
          - "patch"
      other-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # src/composer.json (Laravel バックエンド)
  - package-ecosystem: "composer"
    directory: "/src"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "composer"
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
      include: "scope"
    groups:
      laravel:
        patterns:
          - "laravel/*"
          - "laravel-lang/*"
          - "tightenco/ziggy"
          - "inertiajs/*"
        update-types:
          - "minor"
          - "patch"
      phpstan:
        patterns:
          - "larastan/*"
          - "phpstan/*"
        update-types:
          - "minor"
          - "patch"
      phpcs:
        patterns:
          - "squizlabs/php_codesniffer"
          - "slevomat/coding-standard"
          - "sirbrillig/phpcs-variable-analysis"
          - "dealerdirect/phpcodesniffer-composer-installer"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "phpunit/*"
          - "mockery/*"
          - "fakerphp/*"
        update-types:
          - "minor"
          - "patch"
      spatie:
        patterns:
          - "spatie/*"
        update-types:
          - "minor"
          - "patch"
      swagger:
        patterns:
          - "zircote/*"
        update-types:
          - "minor"
          - "patch"
      other-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Docker (app)
  - package-ecosystem: "docker"
    directory: "/docker/app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  # Docker (db)
  - package-ecosystem: "docker"
    directory: "/docker/db"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  # Docker (nginx)
  - package-ecosystem: "docker"
    directory: "/docker/nginx"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  # Docker (swagger)
  - package-ecosystem: "docker"
    directory: "/docker/swagger"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "chore(docker)"
      include: "scope"

  # GitHub Actions
  # major でも自動マージ workflow 側で弾かれるが、
  # グループに巻き込まれる事故を防ぐため明示的に minor/patch のみグループ化
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Asia/Tokyo"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(ci)"
      include: "scope"
    groups:
      github-actions:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
