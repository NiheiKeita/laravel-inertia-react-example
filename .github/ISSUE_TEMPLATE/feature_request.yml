name: ✨ Feature Request
description: 新機能や改善提案
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: summary
    attributes:
      label: 概要
      description: どんな機能 / 改善をしたいか
    validations:
      required: true
  - type: textarea
    id: motivation
    attributes:
      label: 背景 / 動機
      description: なぜ必要か、何を解決するか
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
  - type: textarea
    id: additional
    attributes:
      label: 補足情報
